type Mutation {
  busPreferencesSet(input: BusPreferenceInput!): BusPreferenceMutationPayload!
  commentCreate(input: CreateCommentInput!): CommentMutationPayload!
  commentDelete(id: ID!): DeleteMutationPayload!
  commentReactionAdd(commentId: ID!, type: CommentReactionType!): CommentReactionMutationPayload!
  commentReactionRemove(commentId: ID!, type: CommentReactionType!): CommentReactionMutationPayload!
  commentUpdate(id: ID!, input: UpdateCommentInput!): CommentMutationPayload!
  commentsDelete(ids: [ID!]!): CommentDeleteBatchPayload!
  descriptionSet(input: UpsertDescriptionInput!): DescriptionMutationPayload!
  homeworkCompletionSet(completed: Boolean!, homeworkId: ID!): HomeworkCompletionMutationPayload!
  homeworkCompletionsSet(items: [HomeworkCompletionBatchItemInput!]!): HomeworkCompletionBatchPayload!
  homeworkCreate(input: CreateHomeworkInput!): HomeworkMutationPayload!
  homeworkDelete(id: ID!): HomeworkDeleteMutationPayload!
  homeworkUpdate(id: ID!, input: UpdateHomeworkInput!): HomeworkMutationPayload!
  linkPinSet(pinned: Boolean!, slug: String!): DashboardLinkPinMutationPayload!
  linkPinsSet(items: [DashboardLinkPinBatchItemInput!]!): DashboardLinkPinBatchMutationPayload!
  subscriptionAdd(jwId: Int!): SectionSubscriptionMutationPayload!
  subscriptionRemove(jwId: Int!): SectionSubscriptionMutationPayload!
  subscriptionsImport(input: UpdateSectionSubscriptionsInput!): SectionSubscriptionBatchPayload!
  todoCompletionsSet(items: [TodoCompletionBatchItemInput!]!): TodoCompletionBatchPayload!
  todoCreate(input: CreateTodoInput!): TodoMutationPayload!
  todoDelete(id: ID!): DeleteMutationPayload!
  todoUpdate(id: ID!, input: UpdateTodoInput!): TodoMutationPayload!
  todosDelete(ids: [ID!]!): TodoDeleteBatchPayload!
  uploadDelete(id: ID!): UploadDeleteMutationPayload!
  uploadRename(filename: String!, id: ID!): UploadMutationPayload!
  uploadSessionComplete(input: CompleteUploadSessionInput!): UploadCompletionPayload!
  uploadSessionCreate(input: CreateUploadSessionInput!): UploadSessionPayload!
}

