type BusCampus {
  id: Int!
  latitude: Float!
  longitude: Float!
  nameCn: String!
  nameEn: String
  namePrimary: String!
  nameSecondary: String
}

input BusPreferenceInput {
  preferredDestinationCampusId: Int
  preferredOriginCampusId: Int
  showDepartedTrips: Boolean!
}

type BusPreferenceMutationPayload {
  preferredDestinationCampusId: Int
  preferredOriginCampusId: Int
  showDepartedTrips: Boolean!
}

type BusRoute {
  descriptionPrimary: String!
  id: Int!
  nameCn: String!
  nameEn: String
  stops: [BusRouteStop!]!
}

type BusRoutePage {
  campuses: [BusCampus!]!
  items: [BusRoute!]!
  pageInfo: PageInfo!
}

type BusRouteStop {
  campusId: Int!
  campusName: String!
  stopOrder: Int!
}

type BusRouteTimetable {
  alternateRoutes: [BusRoute!]!
  route: BusRoute!
  weekday: [BusTripSlot!]!
  weekdayPageInfo: PageInfo!
  weekend: [BusTripSlot!]!
  weekendPageInfo: PageInfo!
}

type BusStopTime {
  stopOrder: Int!
  time: String
}

type BusTripSlot {
  position: Int!
  stopTimes: [BusStopTime!]!
}

type Campus {
  code: String
  id: Int!
  jwId: Int
  nameCn: String!
  nameEn: String
}

type CommentMutationPayload {
  id: ID!
}

type CommentReactionMutationPayload {
  active: Boolean!
  changed: Boolean!
  commentId: ID!
  type: CommentReactionType!
}

enum CommentReactionType {
  CONFUSED
  DOWNVOTE
  EYES
  HEART
  HOORAY
  LAUGH
  ROCKET
  UPVOTE
}

enum CommentTargetType {
  COURSE
  HOMEWORK
  SECTION
  SECTION_TEACHER
  TEACHER
}

enum CommentVisibility {
  LOGGED_IN_ONLY
  PUBLIC
}

type Course {
  category: NamedCatalogValue
  classType: NamedCatalogValue
  classify: NamedCatalogValue
  code: String!
  educationLevel: NamedCatalogValue
  gradation: NamedCatalogValue
  id: Int!
  jwId: Int!
  nameCn: String!
  nameEn: String
  type: NamedCatalogValue
}

input CourseFilter {
  categoryId: Int
  classTypeId: Int
  educationLevelId: Int
  search: String
}

type CoursePage {
  items: [Course!]!
  pageInfo: PageInfo!
}

input CreateCommentInput {
  attachmentIds: [ID!]
  body: String!
  courseJwId: Int
  homeworkId: ID
  isAnonymous: Boolean = false
  parentId: ID
  sectionId: ID
  sectionJwId: Int
  sectionTeacherId: Int
  targetId: ID
  targetType: CommentTargetType!
  teacherId: ID
  visibility: CommentVisibility = PUBLIC
}

input CreateTodoInput {
  content: String
  dueAt: DateTime
  priority: TodoPriority = MEDIUM
  title: String!
}

type DashboardLinkPinMutationPayload {
  maxPinnedLinks: Int!
  pinned: Boolean!
  pinnedSlugs: [String!]!
  slug: String!
}

scalar Date

scalar DateTime

type DeleteMutationPayload {
  id: ID!
  success: Boolean!
}

type Department {
  code: String!
  id: Int!
  nameCn: String!
  nameEn: String
}

type Exam {
  endTime: Int
  examBatch: ExamBatch
  examDate: Date
  examMode: String
  examRooms(page: PageInput): ExamRoomPage!
  examTakeCount: Int
  examType: Int
  id: Int!
  jwId: Int!
  section: Section!
  startTime: Int
}

type ExamBatch {
  id: Int!
  nameCn: String!
  nameEn: String
}

input ExamFilter {
  dateFrom: DateTime
  dateTo: DateTime
  includeDateUnknown: Boolean = true
  semesterId: Int
}

type ExamPage {
  items: [Exam!]!
  pageInfo: PageInfo!
}

type ExamRoom {
  count: Int!
  id: Int!
  room: String!
}

type ExamRoomPage {
  items: [ExamRoom!]!
  pageInfo: PageInfo!
}

type Homework {
  commentCount: Int!
  completed: Boolean!
  completedAt: DateTime
  createdAt: DateTime!
  id: ID!
  isMajor: Boolean!
  publishedAt: DateTime
  requiresTeam: Boolean!
  section: Section!
  submissionDueAt: DateTime
  submissionStartAt: DateTime
  title: String!
  updatedAt: DateTime!
}

type HomeworkCompletionMutationPayload {
  completed: Boolean!
  completedAt: DateTime
  homeworkId: ID!
}

input HomeworkFilter {
  completed: Boolean
  dueAtFrom: DateTime
  dueAtTo: DateTime
  semesterId: Int
}

type HomeworkPage {
  items: [Homework!]!
  pageInfo: PageInfo!
}

type Mutation {
  addCommentReaction(commentId: ID!, type: CommentReactionType!): CommentReactionMutationPayload!
  createComment(input: CreateCommentInput!): CommentMutationPayload!
  createTodo(input: CreateTodoInput!): TodoMutationPayload!
  deleteComment(id: ID!): DeleteMutationPayload!
  deleteTodo(id: ID!): DeleteMutationPayload!
  removeCommentReaction(commentId: ID!, type: CommentReactionType!): CommentReactionMutationPayload!
  saveBusPreferences(input: BusPreferenceInput!): BusPreferenceMutationPayload!
  setDashboardLinkPinState(pinned: Boolean!, slug: String!): DashboardLinkPinMutationPayload!
  setHomeworkCompletion(completed: Boolean!, homeworkId: ID!): HomeworkCompletionMutationPayload!
  subscribeSection(jwId: Int!): SectionSubscriptionMutationPayload!
  unsubscribeSection(jwId: Int!): SectionSubscriptionMutationPayload!
  updateComment(id: ID!, input: UpdateCommentInput!): CommentMutationPayload!
  updateTodo(id: ID!, input: UpdateTodoInput!): TodoMutationPayload!
}

type NamedCatalogValue {
  id: Int!
  nameCn: String!
  nameEn: String
}

type PageInfo {
  page: Int!
  pageSize: Int!
  total: Int!
  totalPages: Int!
}

input PageInput {
  page: Int = 1
  pageSize: Int = 20
}

type Query {
  busRoutes(page: PageInput): BusRoutePage!
  busTimetable(now: DateTime, page: PageInput, routeId: Int!, versionKey: String): BusRouteTimetable
  course(jwId: Int!): Course
  courses(filter: CourseFilter, page: PageInput): CoursePage!
  currentSemester: Semester
  section(jwId: Int!): Section
  sections(filter: SectionFilter, page: PageInput): SectionPage!
  semesters(page: PageInput): SemesterPage!
  teacher(id: Int!): Teacher
  teachers(filter: TeacherFilter, page: PageInput): TeacherPage!
  viewer: Viewer
}

type Schedule {
  customPlace: String
  date: Date
  endTime: Int!
  endUnit: Int!
  experiment: String
  id: Int!
  lessonType: String
  periods: Int!
  room: ScheduleRoom
  scheduleGroup: ScheduleGroup!
  section: Section!
  startTime: Int!
  startUnit: Int!
  teachers(page: PageInput): TeacherPage!
  weekIndex: Int!
  weekday: Int!
}

input ScheduleFilter {
  dateFrom: DateTime
  dateTo: DateTime
  semesterId: Int
  weekday: Int
}

type ScheduleGroup {
  id: Int!
  isDefault: Boolean!
  jwId: Int!
  no: Int!
}

type SchedulePage {
  items: [Schedule!]!
  pageInfo: PageInfo!
}

type ScheduleRoom {
  code: String!
  id: Int!
  jwId: Int!
  nameCn: String!
  nameEn: String
}

type Section {
  campus: Campus
  code: String!
  course: Course!
  credits: Float
  examMode: NamedCatalogValue
  id: Int!
  jwId: Int!
  limitCount: Int
  openDepartment: Department
  period: Int
  periodsPerWeek: Int
  remark: String
  semester: Semester
  stdCount: Int
  teachLanguage: NamedCatalogValue
  timesPerWeek: Int
}

input SectionFilter {
  campusId: Int
  courseId: Int
  courseJwId: Int
  departmentId: Int
  ids: [Int!]
  jwIds: [Int!]
  search: String
  semesterId: Int
  semesterJwId: Int
  teacherCode: String
  teacherId: Int
}

type SectionPage {
  items: [Section!]!
  pageInfo: PageInfo!
}

type SectionSubscriptionMutationPayload {
  sectionJwId: Int!
  subscribed: Boolean!
}

type Semester {
  code: String!
  endDate: Date
  id: Int!
  jwId: Int!
  nameCn: String!
  startDate: Date
}

type SemesterPage {
  items: [Semester!]!
  pageInfo: PageInfo!
}

type Teacher {
  address: String
  code: String
  department: Department
  email: String
  id: Int!
  mobile: String
  nameCn: String!
  nameEn: String
  personId: Int
  sectionCount: Int!
  teacherId: Int
  teacherTitle: NamedCatalogValue
  telephone: String
}

input TeacherFilter {
  departmentId: Int
  search: String
}

type TeacherPage {
  items: [Teacher!]!
  pageInfo: PageInfo!
}

type Todo {
  completed: Boolean!
  content: String
  createdAt: DateTime!
  dueAt: DateTime
  id: ID!
  priority: TodoPriority!
  title: String!
  updatedAt: DateTime!
}

input TodoFilter {
  completed: Boolean
  dueAfter: DateTime
  dueBefore: DateTime
  priority: TodoPriority
}

type TodoMutationPayload {
  id: ID!
}

type TodoPage {
  items: [Todo!]!
  pageInfo: PageInfo!
}

enum TodoPriority {
  HIGH
  LOW
  MEDIUM
}

input UpdateCommentInput {
  attachmentIds: [ID!]
  body: String!
  isAnonymous: Boolean
  visibility: CommentVisibility
}

input UpdateTodoInput {
  completed: Boolean
  content: String
  dueAt: DateTime
  priority: TodoPriority
  title: String
}

type UserProfile {
  createdAt: DateTime!
  email: String!
  id: ID!
  image: String
  isAdmin: Boolean!
  name: String!
  updatedAt: DateTime!
  username: String
}

type Viewer {
  exams(filter: ExamFilter, page: PageInput): ExamPage!
  homeworks(filter: HomeworkFilter, page: PageInput): HomeworkPage!
  overview(atTime: DateTime): ViewerOverview!
  profile: UserProfile!
  schedules(filter: ScheduleFilter, page: PageInput): SchedulePage!
  subscribedSections(page: PageInput): SectionPage!
  todos(filter: TodoFilter, page: PageInput): TodoPage!
}

type ViewerOverview {
  atTime: DateTime!
  completedTodos: Int!
  dueSoonHomeworks: Int!
  homeworkWindowEnd: DateTime!
  incompleteTodos: Int!
  overdueTodos: Int!
  pendingHomeworks: Int!
  today: Date!
  todaySchedules: Int!
  upcomingExams: Int!
}
