name: Static Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run in dry-run mode (rolls back the transaction)"
        required: false
        default: false
        type: boolean

concurrency:
  group: static-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync static snapshot to production database
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare SvelteKit tsconfig
        run: bun run svelte:sync

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:generate

      - name: Deploy Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate:deploy

      - name: Load static snapshot
        id: load
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STATIC_SNAPSHOT_URL: ${{ vars.STATIC_SNAPSHOT_URL || 'https://static.life-ustc.tiankaima.dev/life-ustc-static.sqlite' }}
          STATIC_LOADER_MIN_SEMESTER: ${{ vars.STATIC_LOADER_MIN_SEMESTER || '401' }}
          STATIC_LOADER_DRY_RUN: ${{ inputs.dry-run }}
          STATIC_LOADER_STATS_FILE: /tmp/static-load-stats.json
        run: scripts/load-static-sqlite.sh

      - name: Report stats
        if: success()
        run: |
          echo '## Static Load Stats' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/static-load-stats.json >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
