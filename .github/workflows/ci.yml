name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Check
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_ci
      job-phase: ci:verify

  build-e2e-artifacts:
    name: Build E2E artifacts
    needs: check
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_e2e
      webhook-secret: e2e-ci-secret
      extra-env: NO_PROXY=127.0.0.1,localhost,::1
      job-phase: ci:e2e:build-artifacts
      upload-artifact-name: e2e-svelte-kit
      upload-artifact-path: .svelte-kit
      upload-artifact-no-files-found: error
      upload-artifact-include-hidden-files: true

  static-loader-image:
    name: Static Loader Image
    needs: check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Build static loader image
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if docker build --target loader -t life-ustc-static-loader:check .; then
              break
            fi
            echo "::warning::docker build failed (attempt ${attempt}/3), retrying..."
            sleep 15
          done
      - name: Smoke test static loader image
        run: |
          docker run --rm --entrypoint sh life-ustc-static-loader:check -c '
            command -v curl
            command -v sqlite3
            command -v psql
            test -x scripts/load-static-sqlite.sh
            test -x /usr/local/bin/docker-entrypoint.load.sh
          '
      - name: Dry-run static loader image
        shell: bash
        run: |
          set -euo pipefail

          network="static-loader-check-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          postgres="static-loader-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            docker rm -f "${postgres}" >/dev/null 2>&1 || true
            docker network rm "${network}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create "${network}"
          docker run -d --rm \
            --name "${postgres}" \
            --network "${network}" \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=life_ustc_static_loader \
            postgres:16

          for attempt in $(seq 1 60); do
            if docker exec "${postgres}" pg_isready -U postgres -d life_ustc_static_loader >/dev/null 2>&1; then
              break
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Postgres did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          docker run --rm \
            --network "${network}" \
            -e DATABASE_URL="postgresql://postgres:postgres@${postgres}:5432/life_ustc_static_loader" \
            -e STATIC_LOADER_DRY_RUN=true \
            -e STATIC_LOADER_MIN_SEMESTER=401 \
            life-ustc-static-loader:check

  test-e2e:
    name: E2E Test (${{ matrix.scope }})
    needs:
      - check
      - build-e2e-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: api-mcp
            paths: tests/e2e/src/app/api
          - scope: public-web
            paths: |
              tests/e2e/src/app/test.ts
              tests/e2e/src/app/bus
              tests/e2e/src/app/bus-map
              tests/e2e/src/app/courses
              tests/e2e/src/app/guides
              tests/e2e/src/app/mobile-app
              tests/e2e/src/app/privacy
              tests/e2e/src/app/sections
              tests/e2e/src/app/signin
              tests/e2e/src/app/teachers
              tests/e2e/src/app/terms
              tests/e2e/src/app/u
              tests/e2e/src/app/welcome
              tests/e2e/mobile-screenshots
          - scope: signed-in
            paths: |
              tests/e2e/src/app/dashboard
              tests/e2e/src/app/e2e
              tests/e2e/src/app/oauth
              tests/e2e/src/app/settings
          - scope: admin-comments
            paths: |
              tests/e2e/src/app/admin
              tests/e2e/src/app/comments
              tests/e2e/src/app/error
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_dev
      install-playwright: true
      webhook-secret: e2e-ci-secret
      extra-env: |
        NO_PROXY=127.0.0.1,localhost,::1
      download-artifact-name: e2e-svelte-kit
      download-artifact-path: .svelte-kit
      job-phase: ci:e2e:test
      e2e-test-paths: ${{ matrix.paths }}
      upload-artifact-name: playwright-report-${{ matrix.scope }}
      upload-artifact-path: playwright-report/
      upload-artifact-no-files-found: ignore
      upload-artifact-always: true

  publish-e2e-html-report:
    name: Publish E2E HTML report
    needs: test-e2e
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: publish-e2e-html-report
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Checkout e2e-snapshot-artifacts repo
        uses: actions/checkout@v6
        with:
          repository: Life-USTC/e2e-snapshot-artifacts
          ref: main
          path: e2e-snapshot-artifacts
          token: ${{ secrets.E2E_ARTIFACTS_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all Playwright report artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-reports
          pattern: playwright-report-*

      - name: Merge blob reports into HTML
        run: |
          mkdir -p all-blobs
          for dir in downloaded-reports/playwright-report-*; do
            scope=$(basename "$dir")
            for blob in "$dir"/blob/*.zip; do
              [ -e "$blob" ] || continue
              cp "$blob" "all-blobs/${scope}-$(basename "$blob")"
            done
          done
          bunx playwright merge-reports all-blobs --config playwright.report.config.ts

      - name: Publish report to e2e-snapshot-artifacts branch
        env:
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          report_dir="e2e-snapshot-artifacts/reports/${RUN_ID}"
          mkdir -p "$report_dir"
          cp -R playwright-report/html/. "$report_dir/"

          cd e2e-snapshot-artifacts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Disable Jekyll so GitHub Pages serves the static HTML and assets as-is.
          touch .nojekyll

          # Keep only the latest 30 reports to avoid unbounded growth in the
          # artifacts repo. The new report has already been copied in above.
          ls -1 reports 2>/dev/null | sort -rn | tail -n +31 | xargs -r rm -rf

          cat > index.html <<'INDEX_EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Life@USTC E2E Reports</title>
            </head>
            <body>
              <h1>Life@USTC E2E HTML Reports</h1>
              <ul>
          INDEX_EOF

          for dir in $(ls -1 reports | sort -rn); do
            echo "                <li><a href=\"reports/${dir}/index.html\">Run ${dir}</a></li>" >> index.html
          done

          cat >> index.html <<'INDEX_EOF'
              </ul>
            </body>
          </html>
          INDEX_EOF

          git add "reports/${RUN_ID}" index.html .nojekyll
          git commit -m "chore: publish e2e html report for run ${RUN_ID} (${SHA}) [skip ci]" || exit 0
          git push

      - name: Comment report link on commit and PR
        env:
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          marker="<!-- e2e-report -->"
          report_url="https://life-ustc.github.io/e2e-snapshot-artifacts/reports/${RUN_ID}/index.html"
          index_url="https://life-ustc.github.io/e2e-snapshot-artifacts/"
          body=$(printf '%s\nE2E HTML report is ready: %s\nAll reports: %s' "$marker" "$report_url" "$index_url")

          # Commit comment (create or update existing report comment)
          commit_comment_id=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/comments" --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n1)
          if [ -n "$commit_comment_id" ]; then
            gh api --method PATCH "repos/${REPO}/comments/${commit_comment_id}" -f body="$body" >/dev/null
          else
            gh api --method POST "repos/${REPO}/commits/${COMMIT_SHA}/comments" -f body="$body" >/dev/null
          fi

          # PR comment (create or update existing report comment)
          if [ -n "$PR_NUMBER" ]; then
            pr_comment_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n1)
            if [ -n "$pr_comment_id" ]; then
              gh api --method PATCH "repos/${REPO}/issues/comments/${pr_comment_id}" -f body="$body" >/dev/null
            else
              gh pr comment "$PR_NUMBER" --body "$body"
            fi
          fi
