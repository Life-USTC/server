name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Check
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_ci
      jwt-secret: ci-check-secret-0123456789abcdef0123456789abcdef
      auth-secret: ci-check-secret-0123456789abcdef0123456789abcdef
      job-command: bun run verify

  build-e2e-artifacts:
    name: Build E2E artifacts
    needs: check
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_e2e
      jwt-secret: e2e-ci-secret
      webhook-secret: e2e-ci-secret
      auth-secret: e2e-ci-secret
      extra-env: NO_PROXY=127.0.0.1,localhost,::1
      job-command: bun run build && bun --silent run e2e:prepare
      upload-artifact-name: playwright-worker
      upload-artifact-path: .svelte-kit
      upload-artifact-no-files-found: error
      upload-artifact-include-hidden-files: true

  test-e2e:
    name: E2E Test (${{ matrix.scope }})
    needs:
      - check
      - build-e2e-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: api-mcp
            paths: tests/e2e/src/app/api
          - scope: public-web
            paths: tests/e2e/src/app/test.ts tests/e2e/src/app/bus tests/e2e/src/app/bus-map tests/e2e/src/app/courses tests/e2e/src/app/guides tests/e2e/src/app/mobile-app tests/e2e/src/app/privacy tests/e2e/src/app/sections tests/e2e/src/app/signin tests/e2e/src/app/teachers tests/e2e/src/app/terms tests/e2e/src/app/u tests/e2e/src/app/welcome
          - scope: signed-in
            paths: tests/e2e/src/app/dashboard tests/e2e/src/app/e2e tests/e2e/src/app/oauth tests/e2e/src/app/settings
          - scope: admin-comments
            paths: tests/e2e/src/app/admin tests/e2e/src/app/comments tests/e2e/src/app/error
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_e2e
      install-playwright: true
      jwt-secret: e2e-ci-secret
      webhook-secret: e2e-ci-secret
      auth-secret: e2e-ci-secret
      extra-env: |
        NO_PROXY=127.0.0.1,localhost,::1
      download-artifact-name: playwright-worker
      download-artifact-path: .svelte-kit
      job-command: |
        bun --silent run db:migrate:deploy
        bun --silent run check:e2e
        bun run seed
        bunx playwright test --reporter=list -- ${{ matrix.paths }}
      upload-artifact-name: playwright-report-${{ matrix.scope }}
      upload-artifact-path: playwright-report/
      upload-artifact-no-files-found: ignore
      upload-artifact-always: true
