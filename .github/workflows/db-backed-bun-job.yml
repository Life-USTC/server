name: DB-backed Bun job

on:
  workflow_call:
    outputs:
      artifact-url:
        description: URL for the uploaded artifact, when artifact upload is enabled.
        value: ${{ jobs.run.outputs.artifact-url }}
    inputs:
      database-name:
        required: true
        type: string
      job-phase:
        required: true
        type: string
      e2e-shard:
        required: false
        type: string
        default: ""
      timeout-minutes:
        required: false
        type: number
        default: 30
      install-playwright:
        required: false
        type: boolean
        default: false
      webhook-secret:
        required: false
        type: string
        default: ""
      extra-env:
        required: false
        type: string
        default: ""
      download-artifact-name:
        required: false
        type: string
        default: ""
      download-artifact-path:
        required: false
        type: string
        default: "."
      upload-artifact-name:
        required: false
        type: string
        default: ""
      upload-artifact-path:
        required: false
        type: string
        default: ""
      upload-artifact-no-files-found:
        required: false
        type: string
        default: ignore
      upload-artifact-retention-days:
        required: false
        type: number
        default: 14
      upload-artifact-always:
        required: false
        type: boolean
        default: false
      upload-artifact-include-hidden-files:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-url: ${{ steps.upload-artifact.outputs.artifact-url }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ inputs.database-name }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure job environment
        shell: bash
        run: |
          {
            echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/${{ inputs.database-name }}"
            if [ -n "${{ inputs.webhook-secret }}" ]; then
              echo "WEBHOOK_SECRET=${{ inputs.webhook-secret }}"
            fi
            if [ -n "${{ inputs.extra-env }}" ]; then
              printf '%s\n' "${{ inputs.extra-env }}"
            fi
          } >> "$GITHUB_ENV"

      - name: Setup workspace
        uses: ./.github/actions/setup-bun-env
        with:
          install-playwright: ${{ inputs.install-playwright && 'true' || 'false' }}

      - name: Install PostgreSQL client
        if: ${{ inputs.job-phase == 'ci:integration' || inputs.job-phase == 'ci:rls' || inputs.job-phase == 'ci:e2e:test' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Download artifact
        if: ${{ inputs.download-artifact-name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.download-artifact-name }}
          path: ${{ inputs.download-artifact-path }}

      - name: Run job phase
        shell: bash
        env:
          E2E_SHARD: ${{ inputs.e2e-shard }}
          JOB_PHASE: ${{ inputs.job-phase }}
        run: |
          run_e2e_test_phase() {
            if [[ ! "$E2E_SHARD" =~ ^[1-9][0-9]*/[1-9][0-9]*$ ]]; then
              echo "::error::ci:e2e:test requires e2e-shard in current/total format."
              exit 1
            fi

            bun run app:prepare
            bun run db:migrate:deploy
            bunx prisma db seed
            bunx playwright test --shard="$E2E_SHARD"
          }

          case "$JOB_PHASE" in
            ci:verify)
              bash tests/ci/retry.test.sh
              bun run app:prepare
              bunx wrangler types --include-runtime=false --check
              bunx biome check
              bunx svelte-check --tsconfig ./tsconfig.json
              bunx tsc --noEmit -p tsconfig.typecheck.json
              bunx tsc --noEmit -p tsconfig.typecheck.tests.json
              bunx tsc --noEmit -p tsconfig.typecheck.operational.json
              bunx vitest run
              ;;
            ci:integration)
              bun run app:prepare
              bun run db:migrate:deploy
              bunx prisma db seed
              # The canonical scenario must be safe to load repeatedly.
              bunx prisma db seed
              bunx vitest run --config vitest.integration.config.ts
              ;;
            ci:rls)
              bun run app:prepare
              bun run db:migrate:deploy
              bunx prisma db seed
              # Keep the RLS database setup idempotent like ci:integration.
              bunx prisma db seed
              PGPASSWORD=postgres psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
                --command "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'life_ustc_runtime') THEN CREATE ROLE life_ustc_runtime; END IF; END \$\$" \
                --command "ALTER ROLE life_ustc_runtime LOGIN PASSWORD 'runtime-test-password' NOINHERIT NOBYPASSRLS" \
                --command 'GRANT CONNECT ON DATABASE "${{ inputs.database-name }}" TO life_ustc_runtime' \
                --command 'GRANT USAGE ON SCHEMA public TO life_ustc_runtime' \
                --command 'GRANT SELECT, DELETE ON TABLE "User" TO life_ustc_runtime' \
                --command 'GRANT SELECT, UPDATE ON TABLE "AuditLog", "UserSuspension" TO life_ustc_runtime' \
                --command 'GRANT SELECT ON TABLE "BusCampus" TO life_ustc_runtime' \
                --command 'GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE "Todo", "DashboardLinkClick", "DashboardLinkPin", "BusUserPreference" TO life_ustc_runtime'
              runtime_database_url="postgresql://life_ustc_runtime:runtime-test-password@127.0.0.1:5432/${{ inputs.database-name }}"
              export DATABASE_URL="$runtime_database_url"
              export RLS_TEST_ENABLED=true
              bunx vitest run \
                --config vitest.integration.config.ts \
                tests/integration/rls-database-contract.test.ts
              bunx vitest run \
                --config vitest.integration.config.ts \
                tests/integration/todo-rls.test.ts
              bunx vitest run \
                --config vitest.integration.config.ts \
                tests/integration/personal-preferences-rls.test.ts
              ;;
            ci:e2e:build-artifacts)
              bun run app:prepare
              bun run build
              bash tests/ci/public-route-client-budget.test.sh
              ;;
            ci:e2e:test)
              run_e2e_test_phase
              ;;
            *)
              echo "::error::Unknown DB-backed Bun job phase: $JOB_PHASE"
              exit 1
              ;;
          esac

      - name: Verify OpenAPI parity
        if: ${{ inputs.job-phase == 'ci:verify' }}
        shell: bash
        run: bun run openapi:check

      - name: Verify GraphQL schema compatibility
        if: ${{ inputs.job-phase == 'ci:verify' }}
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          if grep -Eq '^[a-z]+(\([^)]+\))?!:' <<< "$PR_TITLE"; then
            bunx vitest run tests/unit/graphql-schema-snapshot.test.ts
          elif [ -n "$base_sha" ]; then
            git fetch --no-tags --depth=1 origin "$base_sha"
            GRAPHQL_SCHEMA_BASE_REF="$base_sha" bunx vitest run tests/unit/graphql-schema-snapshot.test.ts
          else
            bunx vitest run tests/unit/graphql-schema-snapshot.test.ts
          fi

      - name: Upload artifact
        id: upload-artifact
        if: ${{ always() && inputs.upload-artifact-path != '' && (inputs.upload-artifact-always || success()) }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.upload-artifact-name }}
          path: ${{ inputs.upload-artifact-path }}
          if-no-files-found: ${{ inputs.upload-artifact-no-files-found }}
          retention-days: ${{ inputs.upload-artifact-retention-days }}
          include-hidden-files: ${{ inputs.upload-artifact-include-hidden-files }}
