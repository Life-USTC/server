name: DB-backed Bun job

on:
  workflow_call:
    inputs:
      database-name:
        required: true
        type: string
      minio-bucket:
        required: true
        type: string
      job-command:
        required: true
        type: string
      timeout-minutes:
        required: false
        type: number
        default: 30
      install-playwright:
        required: false
        type: boolean
        default: false
      jwt-secret:
        required: false
        type: string
        default: ""
      webhook-secret:
        required: false
        type: string
        default: ""
      auth-secret:
        required: false
        type: string
        default: ""
      extra-env:
        required: false
        type: string
        default: ""
      download-artifact-name:
        required: false
        type: string
        default: ""
      download-artifact-path:
        required: false
        type: string
        default: "."
      upload-artifact-name:
        required: false
        type: string
        default: ""
      upload-artifact-path:
        required: false
        type: string
        default: ""
      upload-artifact-no-files-found:
        required: false
        type: string
        default: ignore
      upload-artifact-retention-days:
        required: false
        type: number
        default: 14
      upload-artifact-always:
        required: false
        type: boolean
        default: false
      upload-artifact-include-hidden-files:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ inputs.database-name }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure job environment
        shell: bash
        run: |
          {
            echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/${{ inputs.database-name }}"
            echo "S3_BUCKET=${{ inputs.minio-bucket }}"
            echo "AWS_REGION=us-east-1"
            echo "AWS_DEFAULT_REGION=us-east-1"
            echo "AWS_ENDPOINT_URL_S3=http://127.0.0.1:9000"
            echo "AWS_ACCESS_KEY_ID=minioadmin"
            echo "AWS_SECRET_ACCESS_KEY=minioadmin"
            if [ -n "${{ inputs.jwt-secret }}" ]; then
              echo "JWT_SECRET=${{ inputs.jwt-secret }}"
            fi
            if [ -n "${{ inputs.webhook-secret }}" ]; then
              echo "WEBHOOK_SECRET=${{ inputs.webhook-secret }}"
            fi
            if [ -n "${{ inputs.auth-secret }}" ]; then
              echo "AUTH_SECRET=${{ inputs.auth-secret }}"
            fi
            if [ -n "${{ inputs.extra-env }}" ]; then
              printf '%s\n' "${{ inputs.extra-env }}"
            fi
          } >> "$GITHUB_ENV"

      - name: Start MinIO service
        shell: bash
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -e MINIO_API_CORS_ALLOW_ORIGIN=http://127.0.0.1:3000 \
            minio/minio:latest \
            server /data --console-address ":9001"

          for _ in $(seq 1 60); do
            if curl --noproxy "*" -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl --noproxy "*" -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
            echo "MinIO failed to become ready" >&2
            docker logs minio >&2 || true
            exit 1
          fi

      - name: Provision MinIO bucket
        shell: bash
        run: |
          docker exec minio mc alias set local http://127.0.0.1:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
          docker exec minio mc mb --ignore-existing "local/$S3_BUCKET"

      - name: Setup workspace
        uses: ./.github/actions/setup-bun-env
        with:
          install-playwright: ${{ inputs.install-playwright && 'true' || 'false' }}

      - name: Generate Prisma client
        shell: bash
        run: |
          bun run svelte-kit sync
          bun run db generate

      - name: Download artifact
        if: ${{ inputs.download-artifact-name != '' }}
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.download-artifact-name }}
          path: ${{ inputs.download-artifact-path }}

      - name: Run job command
        shell: bash
        run: ${{ inputs.job-command }}

      - name: Upload artifact
        if: ${{ inputs.upload-artifact-path != '' && !inputs.upload-artifact-always }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.upload-artifact-name }}
          path: ${{ inputs.upload-artifact-path }}
          if-no-files-found: ${{ inputs.upload-artifact-no-files-found }}
          retention-days: ${{ inputs.upload-artifact-retention-days }}
          include-hidden-files: ${{ inputs.upload-artifact-include-hidden-files }}

      - name: Upload artifact (always)
        if: ${{ inputs.upload-artifact-path != '' && inputs.upload-artifact-always && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.upload-artifact-name }}
          path: ${{ inputs.upload-artifact-path }}
          if-no-files-found: ${{ inputs.upload-artifact-no-files-found }}
          retention-days: ${{ inputs.upload-artifact-retention-days }}
          include-hidden-files: ${{ inputs.upload-artifact-include-hidden-files }}
