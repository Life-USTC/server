name: DB Migrate Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: db-migrate-deploy
  cancel-in-progress: false

jobs:
  migrate:
    name: Deploy Prisma migrations
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.repository == 'Life-USTC/server')
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Deploy migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Prepare SvelteKit generated files and generate the Prisma client
          # before running migrate deploy.
          bunx svelte-kit sync
          bun run db:generate
          bun run db:migrate:deploy
