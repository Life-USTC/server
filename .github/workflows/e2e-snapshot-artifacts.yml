name: E2E Snapshot Artifacts

on:
  push:
    branches-ignore:
      - e2e-snapshot-artifacts
  workflow_dispatch:

jobs:
  capture-artifacts:
    name: Capture E2E artifacts (${{ github.sha }})
    permissions:
      contents: read
    uses: ./.github/workflows/db-backed-bun-job.yml
    with:
      database-name: life_ustc_e2e_snapshots
      install-playwright: true
      timeout-minutes: 45
      webhook-secret: e2e-snapshot-ci-secret
      auth-secret: e2e-snapshot-ci-secret
      extra-env: |
        NO_PROXY=127.0.0.1,localhost,::1
      job-command: |
        bun run e2e:build-artifacts
        bun run e2e:db:prepare
        bun run seed
        bun run snapshot:capture
      upload-artifact-name: e2e-snapshot-artifacts-${{ github.sha }}
      upload-artifact-path: |
        test-results/snapshots
        test-results/e2e-snapshot-server.log
      upload-artifact-no-files-found: ignore
      upload-artifact-always: true

  comment-artifacts:
    name: Comment E2E artifacts (${{ github.sha }})
    needs: capture-artifacts
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: e2e-snapshot-artifacts-publisher
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-bun-env

      - name: Download E2E snapshot artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: e2e-snapshot-artifacts-${{ github.sha }}
          path: test-results

      - name: Ensure snapshot directory exists
        shell: bash
        run: mkdir -p test-results/snapshots

      - name: Publish screenshot previews
        id: previews
        if: ${{ needs.capture-artifacts.result == 'success' }}
        shell: bash
        run: >
          bun run snapshot:publish-previews --
          --commit "${{ github.sha }}"
          --repository "${{ github.repository }}"

      - name: Render commit comment
        if: ${{ always() }}
        shell: bash
        run: |
          artifact_url="${{ needs.capture-artifacts.outputs.artifact-url }}"
          workflow_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -z "$artifact_url" ]; then
            artifact_url="$workflow_url"
          fi

          bun run snapshot:report -- render-comment \
            --snapshot-dir test-results/snapshots \
            --artifact-url "$artifact_url" \
            --commit "${{ github.sha }}" \
            --status "${{ needs.capture-artifacts.result }}" \
            --screenshot-base-url "${{ steps.previews.outputs.base-url }}" \
            --workflow-url "$workflow_url" \
            --output test-results/e2e-snapshot-comment.md

      - name: Comment on commit
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ ! -s test-results/e2e-snapshot-comment.md ]; then
            echo "No E2E snapshot comment was generated."
            exit 0
          fi

          jq -n --rawfile body test-results/e2e-snapshot-comment.md \
            '{body: $body}' > test-results/e2e-snapshot-comment.json
          gh api \
            --method POST \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input test-results/e2e-snapshot-comment.json
