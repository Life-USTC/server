name: E2E Snapshot Artifacts

on:
  push:
    branches-ignore:
      - e2e-snapshot-artifacts
  workflow_dispatch:

jobs:
  comment-artifacts:
    name: Comment E2E artifacts (${{ github.sha }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: e2e-snapshot-artifacts-publisher
      cancel-in-progress: false
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: life_ustc_e2e_snapshots
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/life_ustc_e2e_snapshots
      JWT_SECRET: e2e-snapshot-ci-secret
      WEBHOOK_SECRET: e2e-snapshot-ci-secret
      AUTH_SECRET: e2e-snapshot-ci-secret
      NO_PROXY: 127.0.0.1,localhost,::1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-bun-env
        with:
          install-playwright: "true"

      - name: Build Worker app
        shell: bash
        run: bun run build && bun run e2e:prepare

      - name: Bootstrap E2E services
        shell: bash
        run: |
          bun run db:migrate:deploy
          bun run check:e2e

      - name: Seed E2E scenarios
        shell: bash
        run: bun run seed

      - name: Capture E2E snapshots
        id: snapshots
        continue-on-error: true
        shell: bash
        run: bun run tools/dev/artifacts/snapshots/snapshot-ci.ts capture

      - name: Upload E2E snapshot artifact
        id: upload
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-snapshot-artifacts-${{ github.sha }}
          path: |
            test-results/snapshots
            test-results/e2e-snapshot-server.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish screenshot previews
        id: previews
        if: ${{ always() }}
        shell: bash
        run: >
          bun run tools/dev/artifacts/snapshots/snapshot-ci.ts publish-previews
          --commit "${{ github.sha }}"
          --repository "${{ github.repository }}"

      - name: Render commit comment
        if: ${{ always() }}
        shell: bash
        run: |
          artifact_url="${{ steps.upload.outputs.artifact-url }}"
          workflow_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -z "$artifact_url" ]; then
            artifact_url="$workflow_url"
          fi

          bun run tools/dev/artifacts/snapshots/snapshot-report.ts render-comment \
            --snapshot-dir test-results/snapshots \
            --artifact-url "$artifact_url" \
            --commit "${{ github.sha }}" \
            --status "${{ steps.snapshots.outcome }}" \
            --screenshot-base-url "${{ steps.previews.outputs.base-url }}" \
            --workflow-url "$workflow_url" \
            --output test-results/e2e-snapshot-comment.md

      - name: Comment on commit
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ ! -s test-results/e2e-snapshot-comment.md ]; then
            echo "No E2E snapshot comment was generated."
            exit 0
          fi

          jq -n --rawfile body test-results/e2e-snapshot-comment.md \
            '{body: $body}' > test-results/e2e-snapshot-comment.json
          gh api \
            --method POST \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input test-results/e2e-snapshot-comment.json

      - name: Fail when snapshot capture failed
        if: ${{ steps.snapshots.outcome != 'success' }}
        shell: bash
        run: exit 1
